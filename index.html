<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store Planning — Promart Homecenter</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

<nav class="topbar">
    <div class="topbar-brand">PROMART <span>STORE PLANNING</span></div>
    <div class="topbar-nav">
        <a href="#fichas">Fichas</a>
        <a href="#revit">Revit BIM</a>
        <a href="#analisis">Análisis CAPEX</a>
    </div>
</nav>

<section id="fichas" class="section">
    <h2 class="title">01. Fichas <span>Tienda Ideal</span></h2>
    <div class="cards-grid">
        <div class="card">
            <h3>Picada 5.00 HMY</h3>
            <p>Estándar técnico para tiendas de gran formato.</p>
            <a href="#" class="btn">Ver Ficha</a>
        </div>
        <div class="card">
            <h3>Picada 7.50 JRM</h3>
            <p>Estándar técnico para tiendas compactas.</p>
            <a href="#" class="btn">Ver Ficha</a>
        </div>
    </div>
</section>

<section id="analisis" class="section dark">
    <h2 class="title" style="color:white">02. Análisis de <span>Métricas</span></h2>
    
    <div class="dashboard">
        <aside class="sidebar">
            <div class="filter-group">
                <label>Subir Datos (Excel)</label>
                <input type="file" id="excelFile" accept=".xlsx, .xls">
            </div>

            <div id="controls" style="display:none">
                <div class="filter-group">
                    <label>Filtrar por País</label>
                    <select id="paisFilter" onchange="actualizarTiendas()"></select>
                </div>

                <div class="filter-group">
                    <label>Seleccionar Tienda</label>
                    <select id="tiendaFilter" onchange="actualizarGrafico()"></select>
                </div>

                <div class="filter-group">
                    <label>Métrica del Gráfico</label>
                    <select id="metricaFilter" onchange="actualizarGrafico()">
                        <option value="m2">Metros Cuadrados (m²)</option>
                        <option value="m3">Metros Cúbicos (m³)</option>
                    </select>
                </div>
            </div>
        </aside>

        <main class="chart-container">
            <canvas id="lineChart"></canvas>
            <div id="noData" class="placeholder">Cargue un archivo Excel para visualizar</div>
        </main>
    </div>
</section>

<script src="script.js"></script>
</body>
</html>
