<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Store Planning — Promart</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
    <nav class="topbar">PROMART <span>STORE PLANNING</span></nav>

    <section class="container">
        <h1>Análisis de Tienda</h1>
        
        <div class="upload-box" onclick="document.getElementById('excelFile').click()">
            <p>📁 Cargar Excel de Tiendas</p>
            <input type="file" id="excelFile" hidden accept=".xlsx, .xls">
        </div>

        <div id="filter-panel" style="display:none;">
            <div class="controls">
                <label>1. Selecciona Tiendas para comparar:</label>
                <div id="store-checkboxes" class="checkbox-grid"></div>
                
                <label style="margin-top:20px;">2. Ver métrica:</label>
                <select id="metricSelector">
                    <option value="m2">Metros Cuadrados (m²)</option>
                    <option value="m3">Metros Cúbicos (m³)</option>
                </select>
                <button onclick="updateChart()" class="btn-update">Actualizar Gráfico</button>
            </div>
        </div>

        <div class="chart-container">
            <canvas id="storeChart"></canvas>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
